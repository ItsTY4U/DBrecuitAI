<div class="admin-job-card">
    <span class="a-cat">{{ job.department }}</span>
    <h2>{{ job.title }}</h2>
    <span class="a-date">Posted {{ job.posted_date|date:"m-d-y" }}</span>
    <div class="admin-actions" style="flex-direction: column; align-items: stretch; gap: 15px; border-top: none; padding-top: 0;">
        <div style="display: inline-block;">
            <span class="job-status">
                {% if job.is_active %}
                    Active
                {% else %}
                    Closed
                {% endif %}
            </span>
        </div>
        <a href="{% url "manage_job" job.pk %}" class="btn btn-primary">Manage</a>
    </div>
</div>
